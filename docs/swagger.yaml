info:
  contact: {}
paths:
  /admin/messages:
    get:
      description: Returns paginated contact messages with optional status filtering
      parameters:
      - description: 'Message status: unread | read'
        in: query
        name: status
        type: string
      - description: Page number
        in: query
        name: page
        type: integer
      - description: Items per page
        in: query
        name: page_size
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: List messages (admin)
      tags:
      - admin
  /admin/messages/{id}:
    delete:
      description: Deletes a contact message permanently
      parameters:
      - description: Message ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "204":
          description: No Content
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Delete message (admin)
      tags:
      - admin
  /admin/messages/{id}/read:
    patch:
      description: Updates message status to read
      parameters:
      - description: Message ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.Message'
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Mark message as read (admin)
      tags:
      - admin
  /admin/orders:
    get:
      description: Returns paginated orders with optional status filtering
      parameters:
      - description: Order status filter
        in: query
        name: status
        type: string
      - description: Page number
        in: query
        name: page
        type: integer
      - description: Items per page
        in: query
        name: page_size
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "403":
          description: Forbidden
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: List all orders (admin)
      tags:
      - admin
  /admin/orders/{id}/status:
    patch:
      consumes:
      - application/json
      description: Updates the status of an order
      parameters:
      - description: Order ID
        in: path
        name: id
        required: true
        type: string
      - description: New status
        in: body
        name: body
        required: true
        schema:
          additionalProperties:
            type: string
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.Order'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Update order status (admin)
      tags:
      - admin
  /admin/reports:
    get:
      description: Returns paginated reports with optional filters
      parameters:
      - description: 'Report type: product | comment | user'
        in: query
        name: type
        type: string
      - description: 'Report status: new | reviewing | closed'
        in: query
        name: status
        type: string
      - description: Page number
        in: query
        name: page
        type: integer
      - description: Items per page
        in: query
        name: page_size
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "403":
          description: Forbidden
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: List reports (admin)
      tags:
      - admin
  /admin/reports/{id}:
    delete:
      description: Deletes a report permanently
      parameters:
      - description: Report ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "204":
          description: No Content
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Delete report (admin)
      tags:
      - admin
  /admin/reports/{id}/ban-user:
    post:
      description: Bans the target user referenced in the report and closes the report
      parameters:
      - description: Report ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Ban user from report (admin)
      tags:
      - admin
  /admin/reports/{id}/status:
    patch:
      consumes:
      - application/json
      description: Updates the status of a report
      parameters:
      - description: Report ID
        in: path
        name: id
        required: true
        type: string
      - description: New report status
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/report.UpdateReportStatusInput'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.Report'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Update report status (admin)
      tags:
      - admin
  /admin/users:
    get:
      parameters:
      - description: 'فیلتر role: user | admin | banned'
        in: query
        name: role
        type: string
      - description: جستجو در نام یا ایمیل
        in: query
        name: search
        type: string
      - description: صفحه
        in: query
        name: page
        type: integer
      - description: تعداد
        in: query
        name: page_size
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "403":
          description: Forbidden
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: لیست همه کاربران (admin)
      tags:
      - admin
  /admin/users/{id}:
    delete:
      parameters:
      - description: User UUID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "204":
          description: No Content
      security:
      - BearerAuth: []
      summary: حذف کاربر (admin)
      tags:
      - admin
    get:
      parameters:
      - description: User UUID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.User'
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: جزئیات کاربر (admin)
