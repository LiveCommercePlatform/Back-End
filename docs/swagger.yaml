      owner:
        $ref: '#/definitions/product.OwnerPublicDTO'
      owner_id:
        type: string
      price:
        type: integer
      rating_avg:
        type: number
      rating_count:
        type: integer
      rating_sum:
        type: integer
      stock:
        type: integer
