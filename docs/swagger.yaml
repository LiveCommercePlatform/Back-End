        type: string
      owner_name:
        type: string
      price:
        type: integer
      stock:
        type: integer
      tags:
        items:
          type: string
        type: array
      title:
        type: string
      view_count:
        type: integer
    type: object
  product.ProductResponseDTO:
    properties:
      category:
        $ref: '#/definitions/models.Category'
      category_id:
        type: integer
      comments:
        items:
          $ref: '#/definitions/models.Comment'
        type: array
      cover_image:
