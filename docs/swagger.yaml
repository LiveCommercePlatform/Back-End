basePath: /
definitions:
  auth.ChangePasswordInput:
    properties:
      current_password:
        type: string
      new_password:
        minLength: 6
        type: string
    required:
    - current_password
    - new_password
    type: object
  auth.ForgotPasswordInput:
    properties:
      email:
        type: string
    required:
    - email
    type: object
  auth.LoginInput:
    properties:
      email:
        type: string
      password:
        type: string
    required:
    - email
    - password
    type: object
  auth.RefreshInput:
    properties:
      refresh_token:
        type: string
    required:
    - refresh_token
    type: object
  auth.ResetPasswordInput:
    properties:
      code:
        type: string
      email:
        type: string
      new_password:
        minLength: 6
        type: string
    required:
    - code
    - email
    - new_password
    type: object
  auth.SignupInput:
    properties:
      email:
        type: string
      name:
        type: string
      password:
        minLength: 6
        type: string
    required:
    - email
    - name
    - password
    type: object
  auth.UpdateProfileInput:
    properties:
      address:
        type: string
      name:
        type: string
      phone:
        type: string
      postal_code:
        type: string
    type: object
  auth.VerifyInput:
    properties:
      code:
        type: string
      email:
        type: string
    required:
    - code
    - email
    type: object
  models.Category:
    properties:
      children:
        items:
          $ref: '#/definitions/models.Category'
        type: array
      created_at:
        type: string
      id:
        type: integer
      key:
        type: string
      name_fa:
        type: string
      parent:
        $ref: '#/definitions/models.Category'
      parent_id:
        type: integer
      updated_at:
        type: string
    type: object
  models.Comment:
    properties:
      content:
        type: string
      created_at:
        type: string
      id:
        type: integer
      product_id:
        type: string
      user:
        $ref: '#/definitions/models.User'
      user_id:
        type: string
    type: object
  models.MediaType:
    enum:
    - image
    - video
    type: string
    x-enum-varnames:
    - MediaImage
    - MediaVideo
  models.Product:
    properties:
      category:
        $ref: '#/definitions/models.Category'
      category_id:
        type: integer
      comments:
        items:
          $ref: '#/definitions/models.Comment'
        type: array
      created_at:
        type: string
      description:
        type: string
      dislike_count:
        type: integer
      id:
        type: string
      like_count:
        type: integer
      media:
        items:
          $ref: '#/definitions/models.ProductMedia'
        type: array
      owner:
        $ref: '#/definitions/models.User'
      owner_id:
        type: string
      price:
        description: Slug        string `gorm:"uniqueIndex;not null" json:"slug"`
        type: integer
      rating_avg:
        type: number
      rating_count:
        type: integer
      rating_sum:
        type: integer
      reports:
        items:
          $ref: '#/definitions/models.ProductReport'
        type: array
      stock:
        type: integer
      tags:
        items:
          $ref: '#/definitions/models.Tag'
        type: array
      title:
        type: string
      updated_at:
        type: string
      view_count:
        type: integer
    type: object
  models.ProductMedia:
    properties:
      id:
        type: integer
      product_id:
        type: string
      type:
        $ref: '#/definitions/models.MediaType'
      url:
        type: string
    type: object
  models.ProductReport:
    properties:
      createdAt:
        type: string
      id:
        type: integer
      productID:
        type: string
      reason:
        type: string
      userID:
        type: string
    type: object
  models.Role:
    enum:
    - admin
    - user
    type: string
    x-enum-varnames:
    - RoleAdmin
    - RoleUser
  models.Tag:
    properties:
      id:
        type: integer
      name:
        type: string
    type: object
  models.User:
    properties:
      address:
        type: string
      created_at:
        type: string
      email:
        type: string
      id:
        type: string
      name:
        type: string
      phone:
        type: string
      postal_code:
        type: string
      role:
        $ref: '#/definitions/models.Role'
      updated_at:
        type: string
      verified:
        type: boolean
    type: object
  product.CategoryNode:
    properties:
      children:
        items:
          $ref: '#/definitions/product.CategoryNode'
        type: array
      id:
        type: integer
      key:
        type: string
      name_fa:
        type: string
      parent_id:
        type: integer
    type: object
  product.CategoryTreeResponse:
    properties:
      data:
        items:
          $ref: '#/definitions/product.CategoryNode'
        type: array
    type: object
  product.CommentResponseDTO:
    properties:
      content:
        type: string
      created_at:
        type: string
      id:
        type: integer
      user:
        $ref: '#/definitions/product.CommentUserDTO'
    type: object
  product.CommentUserDTO:
    properties:
      id:
        type: string
      name:
        type: string
    type: object
  product.CreateCommentInput:
    properties:
      content:
        type: string
    required:
    - content
    type: object
  product.CreateProductInput:
    properties:
      category_id:
        type: integer
      description:
        type: string
      price:
        type: integer
      stock:
        minimum: 0
        type: integer
      tags:
        items:
          type: string
        type: array
      title:
        maxLength: 200
        minLength: 2
        type: string
    required:
    - category_id
    - price
    - title
    type: object
  product.MyEngagementDTO:
    properties:
      disliked:
        type: boolean
      liked:
        type: boolean
    type: object
  product.MyRatingResponse:
    properties:
      my_rating:
        type: integer
    type: object
  product.PaginatedCommentsResponseDTO:
    properties:
      data:
        items:
          $ref: '#/definitions/product.CommentResponseDTO'
        type: array
      pagination:
        $ref: '#/definitions/product.PaginationMetaDTO'
    type: object
  product.PaginationMetaDTO:
    properties:
      limit:
        type: integer
      page:
        type: integer
      total:
        type: integer
      total_pages:
        type: integer
    type: object
  product.ProductListItemDTO:
    properties:
      category_id:
        type: integer
      category_name_fa:
        type: string
      created_at:
        type: string
      id:
        type: string
      like_count:
        type: integer
      owner_id:
        type: string
      owner_name:
        type: string
      price:
        type: integer
      stock:
        type: integer
      tags:
        items:
          type: string
        type: array
      title:
        type: string
      view_count:
        type: integer
    type: object
  product.ProductSearchResponseDTO:
    properties:
      data:
        items:
          $ref: '#/definitions/product.ProductListItemDTO'
        type: array
      pagination:
        $ref: '#/definitions/product.PaginationMetaDTO'
    type: object
  product.ProductStatsDTO:
    properties:
      dislikes:
        type: integer
      engagement:
        type: integer
      likes:
        type: integer
      views:
        type: integer
    type: object
  product.RatingSummaryResponse:
    properties:
      breakdown:
        additionalProperties:
          format: int64
          type: integer
        type: object
      rating_avg:
        type: number
      rating_count:
        type: integer
    type: object
  product.RatingUpsertResponse:
    properties:
      my_rating:
        type: integer
      product_id:
        type: string
      rating_avg:
        type: number
      rating_count:
        type: integer
    type: object
  product.UpdateCommentInput:
    properties:
      content:
        maxLength: 2000
        minLength: 1
        type: string
    required:
    - content
    type: object
  product.UpdateProductInput:
    properties:
      category_id:
        type: integer
      description:
        type: string
      price:
        type: integer
      stock:
        minimum: 0
        type: integer
      tags:
        items:
          type: string
        type: array
      title:
        maxLength: 200
        minLength: 2
        type: string
    type: object
  product.UpsertRatingInput:
    properties:
      rating:
        type: integer
    required:
    - rating
    type: object
host: localhost:8080
info:
  contact: {}
  description: Backend API for Live Commerce project.
  title: LiveCommerce API
  version: "1.0"
paths:
  /auth/change-password:
    patch:
      consumes:
      - application/json
      description: Change current user password
      parameters:
      - description: Change password payload
        in: body
        name: input
        required: true
        schema:
          $ref: '#/definitions/auth.ChangePasswordInput'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Change password
      tags:
      - Authentication
  /auth/forgot-password:
    post:
      consumes:
      - application/json
      description: Send 6-digit code to user's email for password reset
      parameters:
      - description: User email
        in: body
        name: input
        required: true
        schema:
          $ref: '#/definitions/auth.ForgotPasswordInput'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Request password reset code
      tags:
      - Authentication
  /auth/login:
    post:
      consumes:
      - application/json
      description: Authenticate user with email and password
      parameters:
      - description: Login data
        in: body
        name: input
        required: true
        schema:
          $ref: '#/definitions/auth.LoginInput'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Log in user
      tags:
      - Authentication
  /auth/logout:
    post:
      description: Deletes refresh token from Redis using user ID from JWT
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Logout user
      tags:
      - Authentication
  /auth/refresh:
    post:
      consumes:
      - application/json
      description: Generates a new access token using a valid refresh token stored
        in Redis
      parameters:
      - description: Refresh Token Input
        in: body
        name: input
        required: true
        schema:
          $ref: '#/definitions/auth.RefreshInput'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Refresh access token using refresh token
      tags:
      - Authentication
  /auth/reset-password:
    post:
      consumes:
      - application/json
      description: Update password using email and reset code
      parameters:
      - description: Reset password data
        in: body
        name: input
        required: true
        schema:
          $ref: '#/definitions/auth.ResetPasswordInput'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Reset user password
      tags:
      - Authentication
  /auth/signup:
    post:
      consumes:
      - application/json
      description: Create a new user and send verification code
      parameters:
      - description: Signup data
        in: body
        name: input
        required: true
        schema:
          $ref: '#/definitions/auth.SignupInput'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Register a new user
      tags:
      - Authentication
  /auth/verify:
    post:
      consumes:
      - application/json
      description: Confirm email by verification code sent to user
      parameters:
      - description: Email and code
        in: body
        name: input
        required: true
        schema:
          $ref: '#/definitions/auth.VerifyInput'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Verify user's email
      tags:
      - Authentication
  /categories/tree:
    get:
      description: Returns the full category tree (all levels) as nested children.
        Root categories have parent_id = null.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/product.CategoryTreeResponse'
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Get categories tree (full depth)
      tags:
      - categories
  /comments/{id}:
    delete:
      description: Deletes a comment based on its ID. Only the comment owner or an
        admin can perform this action.
      parameters:
      - description: Comment ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "403":
          description: Forbidden
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Delete a comment
      tags:
      - comments
    put:
      consumes:
      - application/json
      description: Updates an existing comment. Only the comment owner or an admin
        can perform this action.
      parameters:
      - description: Comment ID
        in: path
        name: id
        required: true
        type: integer
      - description: Comment content
        in: body
        name: input
        required: true
        schema:
          $ref: '#/definitions/product.UpdateCommentInput'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.Comment'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "403":
          description: Forbidden
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Update a comment
      tags:
      - comments
  /media/{id}:
    delete:
      description: Deletes a media file by ID. Only the product owner can delete media.
      parameters:
      - description: Media ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "403":
          description: Forbidden
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Delete media
      tags:
      - media
  /products:
    get:
      description: Search/filter products by query params with pagination.
      parameters:
      - description: Search in title/description
        in: query
        name: q
        type: string
      - description: Category id
        in: query
        name: category_id
        type: integer
      - description: Min price
        in: query
        name: min_price
        type: integer
      - description: Max price
        in: query
        name: max_price
        type: integer
      - description: Comma-separated tags (e.g. apple,iphone)
        in: query
        name: tags
        type: string
      - description: Owner id (UUID)
        in: query
        name: owner_id
        type: string
      - description: Only stock>0
        in: query
        name: in_stock
        type: boolean
      - description: newest|price_asc|price_desc|views|likes
        in: query
        name: sort
        type: string
      - description: default 1
        in: query
        name: page
        type: integer
      - description: default 20, max 50
        in: query
        name: limit
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/product.ProductSearchResponseDTO'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Search products
      tags:
      - products
    post:
      consumes:
      - application/json
      description: Create a new product. Category must exist and must be a leaf category.
        Tags are strings; backend will normalize and get-or-create.
      parameters:
      - description: Create product input
        in: body
        name: input
        required: true
        schema:
          $ref: '#/definitions/product.CreateProductInput'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/models.Product'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Create product
      tags:
      - products
  /products/{id}:
    delete:
      description: Delete a product by id (UUID). Only owner or admin can delete.
      parameters:
      - description: Product id (UUID)
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "403":
          description: Forbidden
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Delete product
      tags:
      - products
    get:
      description: Get product details by UUID. Increments view_count only when requester
        is NOT admin and NOT the product owner. If unauthenticated, view_count increments.
      parameters:
      - description: Product id (UUID)
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.Product'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Get product by id
      tags:
      - products
    put:
      consumes:
      - application/json
      description: Update product fields by id (UUID). Only product owner or admin
        can update. If tags is provided, tags will be replaced fully; if omitted,
        tags remain unchanged. Category must be a leaf category if provided.
      parameters:
      - description: Product id (UUID)
        in: path
        name: id
        required: true
        type: string
      - description: Update product input
        in: body
        name: input
        required: true
        schema:
          $ref: '#/definitions/product.UpdateProductInput'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.Product'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "403":
          description: Forbidden
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Update product
      tags:
      - products
  /products/{id}/comments:
    get:
      description: Get comments for a product with pagination
      parameters:
      - description: Product id (UUID)
        in: path
        name: id
        required: true
        type: string
      - description: Number of comments (default 20, max 50)
        in: query
        name: limit
        type: integer
      - description: Page number (default 1)
        in: query
        name: page
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/product.PaginatedCommentsResponseDTO'
        "400":
          description: Bad Request
          schema:
