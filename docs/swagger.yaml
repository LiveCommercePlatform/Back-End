definitions:
  auth.ChangePasswordInput:
    properties:
      current_password:
        type: string
      new_password:
        minLength: 6
        type: string
    required:
    - current_password
    - new_password
    type: object
  auth.ForgotPasswordInput:
    properties:
      email:
        type: string
    required:
    - email
    type: object
  auth.LoginInput:
    properties:
      email:
        type: string
      password:
        type: string
    required:
    - email
    - password
    type: object
  auth.RefreshInput:
    properties:
      refresh_token:
        type: string
    required:
    - refresh_token
    type: object
  auth.ResetPasswordInput:
    properties:
      code:
        type: string
      email:
        type: string
      new_password:
        minLength: 6
        type: string
    required:
    - code
    - email
    - new_password
    type: object
  auth.SignupInput:
    properties:
      email:
        type: string
      name:
        type: string
      password:
        minLength: 6
        type: string
    required:
    - email
    - name
    - password
    type: object
  auth.UpdateProfileInput:
    properties:
      address:
        type: string
      name:
        type: string
      phone:
        type: string
      postal_code:
        type: string
    type: object
  auth.VerifyInput:
    properties:
      code:
        type: string
      email:
        type: string
    required:
    - code
    - email
    type: object
  liveRoom.AttachProductsInput:
    properties:
      product_ids:
        items:
          type: string
        minItems: 1
        type: array
    required:
    - product_ids
    type: object
  liveRoom.CreateLiveRoomInput:
    properties:
      description:
        maxLength: 2000
        type: string
      is_recorded:
        type: boolean
      title:
        maxLength: 120
        minLength: 3
        type: string
    required:
    - title
    type: object
  liveRoom.PinProductInput:
    properties:
      is_pinned:
        type: boolean
    type: object
  liveRoom.ReactionSummary:
    properties:
      dislikes:
        type: integer
      likes:
        type: integer
    type: object
  liveRoom.ReorderProductsInput:
    properties:
      items:
        items:
          properties:
            product_id:
              type: string
            sort_order:
              type: integer
          required:
          - product_id
          type: object
        minItems: 1
        type: array
    required:
    - items
    type: object
  liveRoom.UpdateLiveRoomInput:
    properties:
      description:
        maxLength: 2000
        type: string
      is_recorded:
        type: boolean
      title:
        maxLength: 120
        minLength: 3
        type: string
    type: object
  liveRoom.ViewPingInput:
    properties:
      viewer_key:
        type: string
    required:
    - viewer_key
    type: object
  message.SendMessageInput:
    properties:
      content:
        maxLength: 2000
        minLength: 10
        type: string
      email:
        type: string
      name:
        maxLength: 100
        minLength: 2
        type: string
    required:
    - content
    - email
    - name
    type: object
  models.Category:
    properties:
      children:
        items:
          $ref: '#/definitions/models.Category'
        type: array
      created_at:
        type: string
      id:
        type: integer
      key:
        type: string
      name_fa:
        type: string
      parent:
        $ref: '#/definitions/models.Category'
      parent_id:
        type: integer
      updated_at:
        type: string
    type: object
  models.Comment:
    properties:
      content:
        type: string
      created_at:
        type: string
      id:
        type: integer
      product_id:
        type: string
      user:
        $ref: '#/definitions/models.User'
      user_id:
        type: string
    type: object
  models.LiveRoom:
    properties:
      createdAt:
        type: string
      description:
        type: string
      duration:
        type: integer
      endedAt:
        type: string
      host:
        $ref: '#/definitions/models.User'
      hostID:
        type: string
      id:
        type: string
      isRecorded:
        type: boolean
      products:
        items:
          $ref: '#/definitions/models.LiveRoomProduct'
        type: array
      startedAt:
        type: string
      status:
        $ref: '#/definitions/models.LiveStatus'
      title:
        type: string
      totalDislikes:
        type: integer
      totalLikes:
        type: integer
      totalViews:
        type: integer
      updatedAt:
        type: string
    type: object
  models.LiveRoomProduct:
    properties:
      createdAt:
        type: string
      id:
        type: integer
      isPinned:
        type: boolean
      liveRoom:
        $ref: '#/definitions/models.LiveRoom'
      liveRoomID:
        type: string
      product:
        $ref: '#/definitions/models.Product'
      productID:
        type: string
      sortOrder:
        type: integer
      updatedAt:
        type: string
    type: object
  models.LiveStatus:
    enum:
    - scheduled
    - live
    - ended
    type: string
    x-enum-varnames:
    - LiveScheduled
    - LiveLive
    - LiveEnded
  models.MediaType:
    enum:
    - image
    - video
    type: string
    x-enum-varnames:
    - MediaImage
    - MediaVideo
  models.Message:
    properties:
      content:
        type: string
      created_at:
        type: string
      email:
        type: string
      id:
        type: integer
      name:
        type: string
      status:
        $ref: '#/definitions/models.MessageStatus'
      updated_at:
        type: string
    type: object
  models.MessageStatus:
    enum:
    - unread
    - read
    type: string
    x-enum-varnames:
    - MessageUnread
    - MessageRead
  models.Order:
    properties:
      address:
        type: string
      created_at:
        type: string
      id:
        type: string
      items:
        items:
          $ref: '#/definitions/models.OrderItem'
        type: array
      live_room:
        $ref: '#/definitions/models.LiveRoom'
      live_room_id:
        type: string
      phone:
        type: string
      postal_code:
        type: string
      receiver_name:
        type: string
      status:
        $ref: '#/definitions/models.OrderStatus'
      total_amount:
        type: integer
      updated_at:
        type: string
      user:
        $ref: '#/definitions/models.User'
      user_id:
        type: string
    type: object
  models.OrderItem:
    properties:
      id:
        type: integer
      order_id:
        type: string
      product:
        $ref: '#/definitions/models.Product'
      product_id:
        type: string
      qty:
        type: integer
      total_price:
        description: qty * unit_price
        type: integer
      unit_price:
        description: snapshot قیمت موقع خرید
        type: integer
    type: object
  models.OrderStatus:
    enum:
    - pending
    - paid
    - shipped
    - delivered
    - cancelled
    type: string
    x-enum-varnames:
    - OrderPending
    - OrderPaid
    - OrderShipped
    - OrderDelivered
    - OrderCancelled
  models.Product:
    properties:
      category:
        $ref: '#/definitions/models.Category'
      category_id:
        type: integer
      comments:
        items:
          $ref: '#/definitions/models.Comment'
        type: array
      cover_image:
        type: string
      created_at:
        type: string
      description:
        type: string
      dislike_count:
        type: integer
      id:
        type: string
      like_count:
        type: integer
      media:
        items:
          $ref: '#/definitions/models.ProductMedia'
        type: array
      owner:
        $ref: '#/definitions/models.User'
      owner_id:
        type: string
      price:
        description: Slug        string `gorm:"uniqueIndex;not null" json:"slug"`
        type: integer
      rating_avg:
        type: number
      rating_count:
        type: integer
      rating_sum:
        type: integer
      stock:
        type: integer
      tags:
        items:
          $ref: '#/definitions/models.Tag'
        type: array
      title:
        type: string
      updated_at:
        type: string
      view_count:
        type: integer
    type: object
  models.ProductMedia:
    properties:
      id:
        type: integer
      product_id:
        type: string
      type:
        $ref: '#/definitions/models.MediaType'
      url:
        type: string
    type: object
  models.Report:
    properties:
      comment_id:
        type: integer
      created_at:
        type: string
      id:
        type: integer
      product_id:
        type: string
      reason:
        type: string
      reporter:
        $ref: '#/definitions/models.User'
      reporter_id:
        type: string
      status:
        $ref: '#/definitions/models.ReportStatus'
      target_user_id:
        type: string
      type:
        $ref: '#/definitions/models.ReportType'
      updated_at:
        type: string
    type: object
  models.ReportStatus:
    enum:
    - new
    - reviewing
    - closed
    type: string
    x-enum-varnames:
    - ReportStatusNew
    - ReportStatusReviewing
    - ReportStatusClosed
  models.ReportType:
    enum:
    - product
    - comment
    - user
    type: string
    x-enum-varnames:
    - ReportTypeProduct
    - ReportTypeComment
    - ReportTypeUser
  models.Role:
    enum:
    - admin
    - user
    - banned
    type: string
    x-enum-varnames:
    - RoleAdmin
    - RoleUser
    - RoleBanned
  models.Tag:
    properties:
      id:
        type: integer
      name:
        type: string
    type: object
  models.User:
    properties:
      address:
        type: string
      created_at:
        type: string
      email:
        type: string
      id:
        type: string
      name:
        type: string
      phone:
        type: string
      postal_code:
        type: string
      role:
        $ref: '#/definitions/models.Role'
      updated_at:
        type: string
      verified:
        type: boolean
    type: object
  order.CreateOrderInput:
    properties:
      items:
        items:
          $ref: '#/definitions/order.CreateOrderItemInput'
        minItems: 1
        type: array
      live_room_id:
        type: string
    required:
    - items
    type: object
  order.CreateOrderItemInput:
    properties:
      product_id:
        type: string
      qty:
        minimum: 1
        type: integer
    required:
    - product_id
    - qty
    type: object
  product.CategoryNode:
    properties:
      children:
        items:
          $ref: '#/definitions/product.CategoryNode'
        type: array
      id:
        type: integer
      key:
        type: string
      name_fa:
        type: string
      parent_id:
        type: integer
    type: object
  product.CategoryTreeResponse:
    properties:
      data:
        items:
          $ref: '#/definitions/product.CategoryNode'
        type: array
    type: object
  product.CommentResponseDTO:
    properties:
      content:
        type: string
      created_at:
        type: string
      id:
        type: integer
      user:
        $ref: '#/definitions/product.CommentUserDTO'
    type: object
  product.CommentUserDTO:
    properties:
      id:
        type: string
      name:
        type: string
    type: object
  product.CreateCommentInput:
    properties:
      content:
        type: string
    required:
    - content
    type: object
  product.CreateProductInput:
    properties:
      category_id:
        type: integer
      cover_image:
        maxLength: 500
        type: string
      description:
        type: string
      price:
        type: integer
      stock:
        minimum: 0
        type: integer
      tags:
        items:
          type: string
        type: array
      title:
        maxLength: 200
        minLength: 2
        type: string
    required:
    - category_id
    - price
    - title
    type: object
  product.MyEngagementDTO:
    properties:
      disliked:
        type: boolean
      liked:
        type: boolean
    type: object
  product.MyRatingResponse:
    properties:
      my_rating:
        type: integer
    type: object
  product.OwnerPublicDTO:
    properties:
      id:
        type: string
      name:
        type: string
    type: object
  product.PaginatedCommentsResponseDTO:
    properties:
      data:
        items:
          $ref: '#/definitions/product.CommentResponseDTO'
        type: array
      pagination:
        $ref: '#/definitions/product.PaginationMetaDTO'
    type: object
  product.PaginationMetaDTO:
